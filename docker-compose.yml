services:
  db:
    image: postgres:16-alpine
    container_name: samhm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: samhm
      POSTGRES_USER: samhm
      POSTGRES_PASSWORD: samhm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - samhm_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samhm_api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    networks:
      - samhm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:stable-alpine
    container_name: samhm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - samhm_network

  redis:
    image: redis:7-alpine
    container_name: samhm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - samhm_network

networks:
  samhm_network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
